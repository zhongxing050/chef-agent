<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>厨师小D - AI 厨师助手</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  header { background: linear-gradient(135deg, #16213e, #0f3460); padding: 16px 24px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #333; }
  header h1 { font-size: 20px; font-weight: 600; }
  header .badge { background: #e94560; color: #fff; padding: 2px 10px; border-radius: 12px; font-size: 12px; }
  #chat { flex: 1; overflow-y: auto; padding: 16px 24px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 12px 16px; border-radius: 12px; line-height: 1.6; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: #0f3460; color: #e0e0e0; border-bottom-right-radius: 4px; }
  .msg.bot { align-self: flex-start; background: #16213e; color: #e0e0e0; border-bottom-left-radius: 4px; }
  .msg.system { align-self: center; background: #2d2d44; color: #aaa; font-size: 13px; text-align: center; max-width: 60%; }
  .msg.bot pre { background: #0d1b2a; padding: 8px 12px; border-radius: 6px; overflow-x: auto; font-size: 13px; margin: 4px 0; }
  .msg.bot strong { color: #e94560; }
  .msg.bot em { color: #888; }
  .typing { align-self: flex-start; background: #16213e; padding: 12px 20px; border-radius: 12px; border-bottom-left-radius: 4px; display: none; gap: 6px; }
  .typing span { width: 8px; height: 8px; background: #e94560; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0.6); } 40% { transform: scale(1); } }
  footer { padding: 12px 24px; background: #16213e; border-top: 1px solid #333; display: flex; gap: 8px; }
  footer input { flex: 1; padding: 10px 16px; border-radius: 8px; border: 1px solid #333; background: #1a1a2e; color: #e0e0e0; font-size: 14px; outline: none; }
  footer input:focus { border-color: #e94560; }
  footer button { padding: 10px 20px; border-radius: 8px; border: none; background: #e94560; color: #fff; font-size: 14px; cursor: pointer; font-weight: 500; }
  footer button:hover { background: #d63851; }
  footer button:disabled { opacity: 0.5; cursor: not-allowed; }
  @media (max-width: 600px) { #chat { padding: 12px; } .msg { max-width: 90%; font-size: 14px; } footer { padding: 8px 12px; } }
</style>
</head>
<body>
<header>
  <span style="font-size:28px;">🍳</span>
  <h1>厨师小D</h1>
  <span class="badge">AI 厨师助手</span>
</header>

<div id="chat">
  <div class="msg system">👋 你好！我是厨师小D，请输入菜名或烹饪问题~</div>
  <div class="msg bot" id="welcome-msg">
    支持的命令：
    <strong>/menu</strong> 查看全部菜谱<br>
    <strong>/cook + 菜名</strong> 进入做菜模式<br>
    <strong>/reset</strong> 重置对话
  </div>
  <div class="typing" id="typing"><span></span><span></span><span></span></div>
</div>

<footer>
  <input id="input" placeholder="输入菜名，如：红烧肉怎么做？" onkeydown="if(event.key==='Enter') send()">
  <button id="sendBtn" onclick="send()">发送</button>
</footer>

<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');
const typing = document.getElementById('typing');
const sendBtn = document.getElementById('sendBtn');

function addMsg(text, role) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  let safe = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/```(\w*)?\n?([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`(.+?)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
  div.innerHTML = safe;
  chat.insertBefore(div, typing);
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  addMsg(msg, 'user');
  typing.style.display = 'flex';
  sendBtn.disabled = true;

  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });
    const data = await resp.json();
    typing.style.display = 'none';
    addMsg(data.reply, 'bot');
  } catch(e) {
    typing.style.display = 'none';
    addMsg('连接失败，请检查服务是否运行', 'bot');
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

input.focus();
</script>
</body>
</html>
